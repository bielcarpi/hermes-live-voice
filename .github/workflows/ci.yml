name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm audit --audit-level=high
      - run: python3 -m py_compile plugins/hermes-live/__init__.py
      - run: npm pack --dry-run
