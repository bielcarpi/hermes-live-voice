name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          package-manager-cache: false
      - name: Verify tag matches package version
        run: |
          package_version="$(node -p 'require("./package.json").version')"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - name: Verify tag points at protected main
        run: |
          main_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          test "$GITHUB_SHA" = "$main_sha"
        env:
          GH_TOKEN: ${{ github.token }}
      - run: npm ci
      - run: npm run verify
      - run: npm audit --audit-level=moderate
      - run: mkdir -p release
      - run: npm pack --pack-destination release
      - run: sha256sum release/*.tgz > release/SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package
          path: release/
          if-no-files-found: error
          retention-days: 1

  github-release:
    needs: verify-package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_REPO: ${{ github.repository }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package
          path: release
      - name: Verify packaged version and checksum
        run: |
          package_file="$(find release -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -n "$package_file"
          test "$(find release -maxdepth 1 -type f -name '*.tgz' | wc -l)" -eq 1
          sha256sum --check release/SHA256SUMS
          package_version="$(tar -xOf "$package_file" package/package.json | node -e 'let data=""; process.stdin.on("data", (chunk) => data += chunk).on("end", () => process.stdout.write(JSON.parse(data).version))')"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - run: gh release create "$GITHUB_REF_NAME" release/*.tgz release/SHA256SUMS --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

  npm-publish:
    if: vars.PUBLISH_NPM == 'true'
    needs: [verify-package, github-release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package
          path: release
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install trusted-publishing npm CLI
        run: npm install --global --ignore-scripts npm@11.18.0
      - name: Verify trusted-publishing runtime
        run: |
          npm_version="$(npm --version)"
          test "$(node -p 'process.versions.node.split(".")[0]')" = "24"
          test "$npm_version" = "11.18.0"
          node -e '
            const actual = process.argv[1].split(".").map(Number);
            const minimum = [11, 5, 1];
            let comparison = 0;
            for (let index = 0; index < minimum.length; index += 1) {
              if (actual[index] === minimum[index]) continue;
              comparison = actual[index] > minimum[index] ? 1 : -1;
              break;
            }
            if (comparison < 0) {
              throw new Error("npm " + process.argv[1] + " is older than the trusted-publishing minimum 11.5.1");
            }
          ' "$npm_version"
      - name: Verify tag matches package version
        run: |
          package_file="$(find release -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -n "$package_file"
          test "$(find release -maxdepth 1 -type f -name '*.tgz' | wc -l)" -eq 1
          sha256sum --check release/SHA256SUMS
          package_version="$(tar -xOf "$package_file" package/package.json | node -e 'let data=""; process.stdin.on("data", (chunk) => data += chunk).on("end", () => process.stdout.write(JSON.parse(data).version))')"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - run: npm publish ./release/*.tgz --access public --provenance
