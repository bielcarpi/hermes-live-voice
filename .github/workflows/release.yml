name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          package-manager-cache: false
      - name: Verify tag matches package version
        run: |
          package_version="$(node -p 'require("./package.json").version')"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - name: Verify tag points at protected main
        run: |
          main_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          test "$GITHUB_SHA" = "$main_sha"
        env:
          GH_TOKEN: ${{ github.token }}
      - run: npm ci
      - run: npm run verify
      - run: npm audit --audit-level=moderate
      - run: mkdir -p release
      - run: npm pack --pack-destination release
      - run: gh release create "$GITHUB_REF_NAME" release/*.tgz --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

  npm-publish:
    if: vars.PUBLISH_NPM == 'true'
    needs: github-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install trusted-publishing npm CLI
        run: npm install --global npm@11.18.0
      - name: Verify trusted-publishing runtime
        run: |
          npm_version="$(npm --version)"
          test "$(node -p 'process.versions.node.split(".")[0]')" = "24"
          test "$npm_version" = "11.18.0"
          node -e '
            const actual = process.argv[1].split(".").map(Number);
            const minimum = [11, 5, 1];
            let comparison = 0;
            for (let index = 0; index < minimum.length; index += 1) {
              if (actual[index] === minimum[index]) continue;
              comparison = actual[index] > minimum[index] ? 1 : -1;
              break;
            }
            if (comparison < 0) {
              throw new Error("npm " + process.argv[1] + " is older than the trusted-publishing minimum 11.5.1");
            }
          ' "$npm_version"
      - name: Verify tag matches package version
        run: |
          package_version="$(node -p 'require("./package.json").version')"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - run: npm ci
      - run: npm run verify
      - run: npm publish --access public --provenance
