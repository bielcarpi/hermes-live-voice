<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hermes-live demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="topbar">
          <div>
            <h1>hermes-live</h1>
            <p id="status">Disconnected</p>
          </div>
          <button id="connect" type="button">Connect</button>
        </header>

        <div class="controls">
          <label>
            Gateway
            <input id="gateway" type="url" value="" autocomplete="off" />
          </label>
          <label>
            Token
            <input id="token" type="password" autocomplete="off" />
          </label>
        </div>

        <div id="log" class="log" aria-live="polite"></div>

        <form id="text-form" class="composer">
          <input id="text" type="text" placeholder="Ask Hermes..." autocomplete="off" />
          <button type="submit">Send</button>
          <button id="mic" type="button">Mic</button>
          <button id="stop" type="button">Stop</button>
        </form>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
