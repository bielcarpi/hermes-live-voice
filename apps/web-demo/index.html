<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buzzlight</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111'/><path d='M14 8v6h-2v4h2v6h4v-6h2v-4h-2V8h-4z' fill='%2347A85A'/></svg>" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="topbar">
          <div>
            <h1>Buzzlight</h1>
            <p id="status">Disconnected</p>
          </div>
          <button id="connect" type="button">Connect</button>
        </header>

        <div class="controls">
          <label>
            Gateway
            <input id="gateway" type="url" value="" autocomplete="off" />
          </label>
          <label>
            Token
            <input id="token" type="password" autocomplete="off" />
          </label>
        </div>

        <form id="text-form" class="composer">
          <input id="text" type="text" placeholder="Ask a question..." autocomplete="off" />
          <button type="submit">Send</button>
          <button id="mic" type="button">Mic</button>
          <button id="stop" type="button">Stop</button>
          <button id="mute" type="button" class="secondary" aria-pressed="false">Mute sounds</button>
        </form>

        <div id="filters" class="filters" aria-label="Log filters"></div>

        <div id="log" class="log" aria-live="polite"></div>

      </section>
    </main>
    <script type="module" src="/sounds.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
