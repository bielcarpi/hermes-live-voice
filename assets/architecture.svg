<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 430" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Live Voice architecture</title>
  <desc id="desc">A voice client connects to the Hermes Live Voice gateway over JSON and PCM16 WebSocket. The gateway keeps a persistent realtime-provider session separate from per-run Hermes Agent API and event-stream connections.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd21a" />
    </marker>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="#0b0f14" opacity="0.16" />
    </pattern>
  </defs>

  <rect width="1280" height="430" rx="18" fill="#080d12" />
  <rect x="18" y="18" width="1244" height="394" rx="14" fill="#111820" stroke="#273441" stroke-width="2" />
  <rect x="18" y="18" width="1244" height="394" rx="14" fill="url(#scan)" />

  <g font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g>
      <rect x="55" y="145" width="280" height="140" rx="12" fill="#142029" stroke="#4c6575" stroke-width="2" />
      <text x="195" y="194" fill="#ffd21a" font-size="25" font-weight="700" text-anchor="middle">Voice client</text>
      <text x="195" y="231" fill="#e7edf7" font-size="18" text-anchor="middle">Dashboard · browser · app</text>
      <text x="195" y="260" fill="#aebdca" font-size="16" text-anchor="middle">microphone · playback · controls</text>
    </g>

    <g>
      <rect x="500" y="120" width="300" height="190" rx="12" fill="#2a2718" stroke="#ffd21a" stroke-width="3" />
      <text x="650" y="172" fill="#ffd21a" font-size="27" font-weight="800" text-anchor="middle">Hermes Live Voice</text>
      <text x="650" y="211" fill="#e7edf7" font-size="18" text-anchor="middle">auth · sessions · audio</text>
      <text x="650" y="240" fill="#e7edf7" font-size="18" text-anchor="middle">protocol · bounds · policy</text>
      <text x="650" y="279" fill="#aebdca" font-size="16" text-anchor="middle">translator and security boundary</text>
    </g>

    <g>
      <rect x="945" y="45" width="280" height="140" rx="12" fill="#142029" stroke="#4c6575" stroke-width="2" />
      <text x="1085" y="94" fill="#ffd21a" font-size="25" font-weight="700" text-anchor="middle">Realtime provider</text>
      <text x="1085" y="131" fill="#e7edf7" font-size="18" text-anchor="middle">Gemini Live · OpenAI Realtime</text>
      <text x="1085" y="160" fill="#aebdca" font-size="16" text-anchor="middle">ears · mouth · turn-taking</text>
    </g>

    <g>
      <rect x="945" y="245" width="280" height="140" rx="12" fill="#142029" stroke="#4c6575" stroke-width="2" />
      <text x="1085" y="294" fill="#ffd21a" font-size="25" font-weight="700" text-anchor="middle">Hermes Agent</text>
      <text x="1085" y="331" fill="#e7edf7" font-size="18" text-anchor="middle">memory · tools · skills · MCP</text>
      <text x="1085" y="360" fill="#aebdca" font-size="16" text-anchor="middle">brain · actions · approvals</text>
    </g>

    <g fill="none" stroke="#ffd21a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)">
      <path d="M 350 215 L 485 215" />
      <path d="M 815 175 C 865 175 885 115 930 115" />
      <path d="M 815 255 C 865 255 885 315 930 315" />
    </g>

    <g fill="#e7edf7" font-size="15" text-anchor="middle">
      <rect x="352" y="170" width="132" height="32" rx="7" fill="#080d12" stroke="#273441" />
      <text x="418" y="191">JSON + PCM16 WS</text>
      <rect x="820" y="76" width="128" height="32" rx="7" fill="#080d12" stroke="#273441" />
      <text x="884" y="97">realtime session</text>
      <rect x="838" y="322" width="110" height="32" rx="7" fill="#080d12" stroke="#273441" />
      <text x="893" y="343">Runs API + SSE</text>
    </g>

    <path d="M 940 205 C 895 205 865 205 815 205" fill="none" stroke="#d57921" stroke-width="2" stroke-dasharray="8 7" marker-end="url(#arrow)" />
    <text x="878" y="228" fill="#aebdca" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="middle">3 gateway tools</text>
  </g>
</svg>
