services:
  hermes-live:
    init: true
    restart: unless-stopped
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      HERMES_LIVE_HOST: 0.0.0.0
      HERMES_LIVE_PORT: 8788
      HERMES_BASE_URL: ${HERMES_BASE_URL:-http://host.docker.internal:8642}
      HERMES_AGENT_API_SERVER_KEY: ${HERMES_AGENT_API_SERVER_KEY:?set HERMES_AGENT_API_SERVER_KEY to the Hermes API_SERVER_KEY}
      HERMES_LIVE_HERMES_TIMEOUT_MS: ${HERMES_LIVE_HERMES_TIMEOUT_MS:-30000}
      HERMES_LIVE_HERMES_STREAM_IDLE_TIMEOUT_MS: ${HERMES_LIVE_HERMES_STREAM_IDLE_TIMEOUT_MS:-120000}
      HERMES_LIVE_PROVIDER: ${HERMES_LIVE_PROVIDER:-mock}
      HERMES_LIVE_AUTH_TOKEN: ${HERMES_LIVE_AUTH_TOKEN:?set HERMES_LIVE_AUTH_TOKEN to a high-entropy gateway token}
      HERMES_LIVE_ALLOW_UNAUTHENTICATED: ${HERMES_LIVE_ALLOW_UNAUTHENTICATED:-false}
      HERMES_LIVE_ALLOW_ORIGIN: ${HERMES_LIVE_ALLOW_ORIGIN:-}
      HERMES_LIVE_MAX_AUDIO_BYTES: ${HERMES_LIVE_MAX_AUDIO_BYTES:-2000000}
      HERMES_LIVE_MAX_TEXT_CHARS: ${HERMES_LIVE_MAX_TEXT_CHARS:-20000}
      HERMES_LIVE_PROVIDER_READY_TIMEOUT_MS: ${HERMES_LIVE_PROVIDER_READY_TIMEOUT_MS:-15000}
      HERMES_LIVE_DEMO_ENABLED: ${HERMES_LIVE_DEMO_ENABLED:-false}
      HERMES_LIVE_TASK_STATE_FILE: /var/lib/hermes-live/tasks-v1.json
      HERMES_LIVE_MAX_CONCURRENT_TASKS: ${HERMES_LIVE_MAX_CONCURRENT_TASKS:-3}
      HERMES_LIVE_MAX_QUEUED_TASKS: ${HERMES_LIVE_MAX_QUEUED_TASKS:-32}
      HERMES_LIVE_TASK_HISTORY_LIMIT: ${HERMES_LIVE_TASK_HISTORY_LIMIT:-200}
      HERMES_LIVE_TASK_RETENTION_HOURS: ${HERMES_LIVE_TASK_RETENTION_HOURS:-168}
      HERMES_LIVE_TASK_POLL_INTERVAL_MS: ${HERMES_LIVE_TASK_POLL_INTERVAL_MS:-2000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-live-preview}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_REALTIME_MODEL: ${OPENAI_REALTIME_MODEL:-gpt-realtime-2.1}
      OPENAI_REALTIME_TURN_DETECTION: ${OPENAI_REALTIME_TURN_DETECTION:-disabled}
    ports:
      - "127.0.0.1:${HERMES_LIVE_HOST_PORT:-8788}:8788"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - hermes-live-state:/var/lib/hermes-live
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    stop_grace_period: 10s

volumes:
  hermes-live-state:
