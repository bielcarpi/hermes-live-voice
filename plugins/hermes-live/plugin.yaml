name: hermes-live
version: 0.7.1
description: "Continue any Hermes chat by voice while durable background tasks keep working and report back."
author: Biel Carpi and Hermes Live contributors
kind: standalone
provides_tools:
  - hermes_live_status
provides_commands:
  - hermes-live
entrypoint: __init__.py
metadata:
  gateway_default_url: http://127.0.0.1:8788
  websocket_path: /v1/live
  capabilities_path: /v1/capabilities
  ready_path: /ready
  mode: gateway
