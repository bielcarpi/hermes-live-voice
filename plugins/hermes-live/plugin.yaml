name: hermes-live
version: 0.4.0
description: "Connect Hermes Agent to an interruptible Gemini Live or OpenAI Realtime voice session through the self-hosted Hermes Live Voice gateway."
author: Biel Carpi and Hermes Live contributors
kind: standalone
provides_tools:
  - hermes_live_status
provides_commands:
  - hermes-live
entrypoint: __init__.py
metadata:
  gateway_default_url: http://127.0.0.1:8788
  websocket_path: /v1/live
  capabilities_path: /v1/capabilities
  ready_path: /ready
  mode: gateway
